<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manager Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            align-items: center;
            background: #f5f7fb;
            color: #172033;
            display: flex;
            font-family: Arial, sans-serif;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }

        .login-panel {
            background: #fff;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            max-width: 420px;
            padding: 24px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px;
        }

        p {
            color: #64748b;
            margin: 0 0 18px;
        }

        .credentials {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            margin-bottom: 18px;
            padding: 12px;
        }

        .credentials strong {
            display: inline-block;
            min-width: 92px;
        }

        form,
        label {
            display: grid;
            gap: 10px;
        }

        form {
            gap: 14px;
        }

        label {
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input {
            border: 1px solid #d8dee9;
            border-radius: 6px;
            color: #172033;
            font: inherit;
            padding: 10px;
            width: 100%;
        }

        button {
            background: #2563eb;
            border: 0;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font: inherit;
            padding: 10px 12px;
        }

        .error {
            color: #dc2626;
            margin: 0;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <h1>Manager Login</h1>
        <p>Sign in to access the team lead dashboard.</p>

        <div class="credentials">
            <div><strong>Username:</strong> manager</div>
            <div><strong>Password:</strong> manager123</div>
        </div>

        {% if form.errors %}
            <p class="error">Invalid username or password.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label>
                Username
                <input name="username" autocomplete="username" required autofocus>
            </label>
            <label>
                Password
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Login</button>
        </form>
    </main>
</body>
</html>
